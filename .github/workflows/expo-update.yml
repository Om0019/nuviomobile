name: Expo OTA Update

on:
  push:
    branches:
      - main
      - production

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      EAS_SKIP_AUTO_FINGERPRINT: 1

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: expo/expo-github-action@v8
        with:
          token: ${{ secrets.EXPO_TOKEN }}
          eas-version: latest

      - run: npm ci

      - name: Verify OTA env
        run: |
          test -n "$EXPO_PUBLIC_SUPABASE_URL"
          test -n "$EXPO_PUBLIC_SUPABASE_ANON_KEY"

      - name: Publish OTA update
        run: |
          UPDATE_MESSAGE="$(git log -1 --pretty=%s)"
          echo "OTA_UPDATE_MESSAGE=$UPDATE_MESSAGE" >> $GITHUB_ENV
          eas update --branch production --message "$UPDATE_MESSAGE"

      - name: Send OTA push notification
        run: node ./scripts/send-ota-push.mjs
